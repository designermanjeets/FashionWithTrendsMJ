<ng-container *ngIf="image?.redirect_link?.link_type === 'external_url'; else collection">
  <a href="{{ image?.redirect_link?.link }}" target="_self" class="banner-contain d-block h-100">
    <img
      [src]="storageURL + image?.image_url"
      class="h-100 bg-img w-100"
      [ngClass]="{'object-fit-cover': bgImage, class: true}"
      alt="banner"
      width="1200"
      height="600"
      [attr.fetchpriority]="fetchPriority"
      [attr.loading]="fetchPriority === 'high' ? 'eager' : 'lazy'">
  </a>
</ng-container>
<ng-template #collection>
  <ng-container *ngIf="image?.redirect_link?.link_type === 'collection'; else product">
    <a [routerLink]="['/category', image?.redirect_link?.link]" >
      <img
        [src]="storageURL + image?.image_url"
        class="h-100 bg-img w-100"
        [ngClass]="{'object-fit-cover': bgImage, class: true}"
        alt="banner"
        width="1200"
        height="600"
        [attr.fetchpriority]="fetchPriority"
        [attr.loading]="fetchPriority === 'high' ? 'eager' : 'lazy'">
    </a>
  </ng-container>
</ng-template>
<ng-template #product>
  <ng-container *ngIf="image?.redirect_link?.link_type === 'product' else onlyImage">
    <a [routerLink]="['/product/', getProductSlug(image?.redirect_link?.link, (product$ | async)?.data!)]">
      <img
        [src]="storageURL + image?.image_url"
        class="h-100 bg-img w-100"
        [ngClass]="{'object-fit-cover': bgImage, class: true}"
        alt="banner"
        width="1200"
        height="600"
        [attr.fetchpriority]="fetchPriority"
        [attr.loading]="fetchPriority === 'high' ? 'eager' : 'lazy'">
    </a>
  </ng-container> 
</ng-template>
<ng-template #onlyImage>
    <img
      [src]="storageURL + image?.image_url"
      class="h-100 bg-img w-100"
      [ngClass]="{'object-fit-cover': bgImage, class: true}"
      alt="banner"
      width="1200"
      height="600"
      [attr.fetchpriority]="fetchPriority"
      [attr.loading]="fetchPriority === 'high' ? 'eager' : 'lazy'">
</ng-template>
