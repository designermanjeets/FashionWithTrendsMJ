<div class="title title-flex-2" [class]="class" *ngIf="style === 'simple' && title; else classic">
  <h1 *ngIf="asH1; else simpleH2">{{ title }}</h1>
  <ng-template #simpleH2>
    <h2>{{ title }}</h2>
  </ng-template>
  <ng-content></ng-content>
</div>
<ng-template #classic>
  <div [class]="class" *ngIf="title">
    <div>
      <h1 *ngIf="asH1; else classicH2">{{ title }}</h1>
      <ng-template #classicH2>
        <h2>{{ title }}</h2>
      </ng-template>
      <span class="title-leaf">
        <svg class="icon-width">
          <use attr.xlink:href="assets/svg/leaf.svg#{{svg}}"></use>
        </svg>
      </span>
      <p *ngIf="description">{{ description }}</p>
    </div>
  </div>
</ng-template>
